</head>
<body>
  <!-- Navigation Bar -->
    <nav id="navbar">
        <div id="nav-element-wrapper">
            <div>
                <a href="index.html"><img src="asset/logo_dark.png" id="nav-logo" alt="V-Phone Logo"></a>

                <img src="asset/hamburger.png" id="hamburger" alt="">
            </div>

        <div id="hamburger-nav-wrapper">

            <a href="index.html">Home</a>

            <a href="about.html">About Us</a>

          </div>
        </div>
    </nav>

    <!-- Registration Form -->
    <div class="form-container">
        <h2>Registration</h2>
  
        <form id="registrationForm" action="" method="post">
          
          <!-- Username -->
          <div class="input-group">
            <label for="nama"> Name:</label>
            <input type="text" name="nama" id="nama" placeholder="Enter your name...">
          </div>

          <!-- Email -->
          <div class="input-group">
            <label for="email"> E-mail:</label>
            <input type="email" name="email" id="email" placeholder="Enter your e-mail...">
          </div>

          <!-- Gender -->
          <div class="input-group">
            <label for="gender"> Gender:</label>
            <select name="gender" id="gender">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <!-- Password -->
          <div class="input-group">
            <label for="password"> Password:</label>
            <input type="password" name="password" id="password" placeholder="Enter your password...">
          </div>
  
          <!-- Confirm Password -->
          <div class="input-group">
            <label for="confpass"> Confirm Password:</label>
            <input type="password" name="confpass" id="confpass" placeholder="Confirm your password...">
          </div>
  
          <div class="button-container">
            <button>Sign Up</button>
          </div>
        </form>
    </div>

  <!-- Footer -->
  <footer>
    <div id="inner-footer-wrapper">

                <div id="contact-list-wrapper">
                    <a href="https://api.whatsapp.com" class="contact-detail">
                        <img class="whatsapp" src="asset/whatsapp.png" alt="">
                        <p>+62 821-1234-5678</p>
                    </a>
                    <a href="https://mail.google.com" class="contact-detail">
                        <img class= "gmail" src="asset/gmail.png" alt="">

                    </a>
                </div>
                <h3>Our Social Media</h3>
                <div id="social-media-list-wrapper">

                </div>
            </div>
        </div>
    </div>
</footer>
